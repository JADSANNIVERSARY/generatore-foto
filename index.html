<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Nostri Momenti Segreti 📸</title>
    <style>
        :root {
            --navy: #1B365D;
            --light-blue: #E8EEF5;
            --text: #333333;
            --pink: #ff3366;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #F4F7FA;
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        h1 { color: var(--navy); text-align: center; font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { color: #555; text-align: center; margin-top: 0; margin-bottom: 25px; }

        /* Pulsantone Misterioso */
        .snap-btn {
            background: linear-gradient(135deg, var(--pink), var(--navy));
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(27, 54, 93, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 30px;
        }
        .snap-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(27, 54, 93, 0.4);
        }
        .snap-btn:active { transform: scale(0.95); }

        /* Area del Tavolo/Collage */
        #canvas-area {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 480px;
            border: 3px dashed #cbd5e1;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.6);
            overflow: hidden;
        }

        /* Stile Polaroid (Senza spazio per il testo in basso) */
        .polaroid {
            position: absolute;
            background: white;
            padding: 10px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-radius: 2px;
            width: 130px;
            animation: dropIn 0.3s ease-out forwards;
        }

        @keyframes dropIn {
            0% { transform: scale(1.5); opacity: 0; }
            100% { opacity: 1; }
        }

        .polaroid img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 2px;
            display: block; 
        }
    </style>
</head>
<body>

    <h1>I Nostri Momenti 📸</h1>
    <p class="subtitle">Premi il pulsante per far apparire un ricordo a sorpresa sul tavolo</p>

    <!-- Unico pulsante misterioso -->
    <button class="snap-btn" onclick="sviluppaProssimoRicordo()">Clicca e scopri ❤️‍🔥</button>

    <!-- Area del Collage -->
    <div id="canvas-area"></div>

    <script>
        // Elenco bloccato a esattamente 20 foto reali presenti nella cartella
        const listaSegreta = [
            "4BA74D50-2A91-4AED-8ACB-B66ECD8D14BD_1_105_c.jpeg",
            "5B10DCCA-78CC-4A04-A82E-AB2EA510BFD6_1_105_c.jpeg",
            "9CE6A94E-84B3-4576-A1D0-33B7218FEE51_1_105_c.jpeg",
            "9DF60152-D9B9-4522-9ACD-EEEB03ABA3F1_1_105_c.jpeg",
            "30FA1AED-E72A-4931-8B67-1B609F6D30E1_1_105_c.jpeg",
            "93E5F9DF-F0E5-4E6A-8F94-03878B4E7DD9_1_105_c.jpeg",
            "5047EF85-366A-4301-98F2-E2E74F347D59_1_105_c.jpeg",
            "8385FF3D-175C-4E50-8975-EC320BB613D7_1_105_c.jpeg",
            "9265FC14-544A-48C9-AF44-B872F7EB08AD_1_105_c.jpeg",
            "1546506F-A8B1-4939-B67D-9CEC6712A00F_1_105_c.jpeg",
            "A2ADE426-F88F-4E4B-9FCC-72C81AC4EBFD_1_105_c.jpeg",
            "ABE945BD-66C3-46B8-B507-6DD53AED4A7D_1_105_c.jpeg",
            "AC5F79A8-5777-4CDE-B320-022BA8220E59_1_105_c.jpeg",
            "B24E0B9A-6D77-44CC-988A-3BD497A04E08_1_105_c.jpeg",
            "B241AB97-92D4-4E27-9695-802737F2CE34_1_105_c.jpeg",
            "B530B80E-C96F-4E5D-A9BA-4984B11D4133_1_105_c.jpeg",
            "BD267D6B-2A25-4129-92E0-A357927C60EB_1_105_c.jpeg",
            "DE90931C-E854-47E0-898F-32D965156D44_1_105_c.jpeg",
            "F584218A-EF43-408B-B278-F09801D9D8A3_1_105_c.jpeg",
            "FF7F78F7-CBC8-4A91-8CC7-55B1B6CFA103_1_105_c.jpeg"
        ];

        let indiceCorrente = 0;

        function sviluppaProssimoRicordo() {
            if (listaSegreta.length === 0) return;

            const canvas = document.getElementById('canvas-area');
            const nomeFoto = listaSegreta[indiceCorrente];

            const card = document.createElement('div');
            card.className = 'polaroid';
            card.innerHTML = '<img src="' + nomeFoto + '">';

            const maxLeft = canvas.clientWidth - 140;
            const maxTop = canvas.clientHeight - 120;
            
            const randomLeft = Math.floor(Math.random() * Math.max(10, maxLeft));
            const randomTop = Math.floor(Math.random() * Math.max(10, maxTop));
            const randomRotate = Math.floor(Math.random() * 30) - 15; 

            card.style.left = randomLeft + 'px';
            card.style.top = randomTop + 'px';
            card.style.transform = 'rotate(' + randomRotate + 'deg)';
            
            card.style.zIndex = document.querySelectorAll('.polaroid').length + 1;

            canvas.style.backgroundColor = "rgba(255,255,255,0.9)";
            setTimeout(() => { canvas.style.backgroundColor = "rgba(255, 255, 255, 0.6)"; }, 80);

            canvas.appendChild(card);

            // Gira in cerchio continuo tra le tue 20 foto
            indiceCorrente = (indiceCorrente + 1) % listaSegreta.length;
        }
    </script>
</body>
</html>
